name: CI

on:
  push:
    branches: [master, main, "feature/**"]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      MongoDb__ConnectionString: mongodb://localhost:27017
      MongoDb__DatabaseName: semana_ia_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Unit Tests
        run: dotnet test tests/SemanaIA.ServiceInvoice.UnitTests --no-build -v normal

      - name: Integration Tests
        run: dotnet test tests/SemanaIA.ServiceInvoice.IntegrationsTests --no-build -v normal --logger "console;verbosity=detailed"
