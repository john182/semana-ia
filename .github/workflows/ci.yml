name: CI

on:
  push:
    branches: [master, main, "feature/**", "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  SONAR_ENABLED: ${{ secrets.SONAR_TOKEN != '' && vars.SONAR_ORGANIZATION != '' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      MongoDb__ConnectionString: mongodb://localhost:27017
      MongoDb__DatabaseName: semana_ia_test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Java
        if: ${{ env.SONAR_ENABLED == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install SonarScanner
        if: ${{ env.SONAR_ENABLED == 'true' }}
        run: dotnet tool install --global dotnet-sonarscanner --version 9.0.2 || dotnet tool update --global dotnet-sonarscanner --version 9.0.2

      - name: Restore
        run: dotnet restore

      - name: SonarScanner Begin
        id: sonar_begin
        if: ${{ env.SONAR_ENABLED == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"${{ vars.SONAR_PROJECT_KEY || 'SemanaIA' }}" \
            /o:"${{ vars.SONAR_ORGANIZATION }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" \
            /d:sonar.exclusions="providers/**,docs/**,openspec/**,ia/**,.github/**,.claude/**,.codex/**,.cursor/**"

      - name: Build
        run: dotnet build --no-restore

      - name: Unit Tests
        run: dotnet test tests/SemanaIA.ServiceInvoice.UnitTests --no-build --no-restore -v normal --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Integration Tests
        run: dotnet test tests/SemanaIA.ServiceInvoice.IntegrationsTests --no-build --no-restore -v normal --logger "console;verbosity=detailed" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: SonarScanner End
        if: ${{ always() && steps.sonar_begin.outcome == 'success' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN" || echo "::warning::SonarScanner End failed — ensure project exists on SonarCloud"
