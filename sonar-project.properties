# Reference configuration for SonarCloud. NOT consumed automatically by dotnet-sonarscanner.
# For local analysis: replace PLACEHOLDER and run:
#   dotnet sonarscanner begin /k:"SemanaIA" /o:"YOUR_ORG" /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"
# For CI: configure secret SONAR_TOKEN and variable SONAR_ORGANIZATION in GitHub repo settings.
sonar.projectKey=SemanaIA
# sonar.organization=YOUR_ORG  # Replace with your SonarCloud organization key before running locally
sonar.projectName=SemanaIA

sonar.sources=src/
sonar.tests=tests/
sonar.exclusions=providers/**,docs/**,openspec/**,ia/**,.github/**,.claude/**,.codex/**,.cursor/**
sonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml
sonar.qualitygate.wait=true
sonar.sourceEncoding=UTF-8
