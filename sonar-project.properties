# Configure SONAR_TOKEN secret and SONAR_ORGANIZATION variable in GitHub repo settings.
# The CI workflow uses vars.SONAR_PROJECT_KEY and vars.SONAR_ORGANIZATION with these as fallbacks.
sonar.projectKey=SemanaIA
sonar.organization=PLACEHOLDER
sonar.projectName=SemanaIA

sonar.sources=src/
sonar.tests=tests/
sonar.exclusions=providers/**,docs/**,openspec/**,ia/**,.github/**,.claude/**,.codex/**,.cursor/**
sonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml
sonar.qualitygate.wait=true
sonar.sourceEncoding=UTF-8
