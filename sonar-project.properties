# CI passes SONAR_PROJECT_KEY and SONAR_ORGANIZATION explicitly; this file is used for local analysis.
# Before running locally: replace PLACEHOLDER with your SonarCloud organization.
# For CI: configure secret SONAR_TOKEN and variable SONAR_ORGANIZATION in GitHub repo settings.
sonar.projectKey=SemanaIA
sonar.organization=PLACEHOLDER
sonar.projectName=SemanaIA

sonar.sources=src/
sonar.tests=tests/
sonar.exclusions=providers/**,docs/**,openspec/**,ia/**,.github/**,.claude/**,.codex/**,.cursor/**
sonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml
sonar.qualitygate.wait=true
sonar.sourceEncoding=UTF-8
